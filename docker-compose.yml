services:
  web:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development

  discord_bot:
    build: .
    command: python -m discord_bot.main
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - web
